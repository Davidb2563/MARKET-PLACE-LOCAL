services:
  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: MARKETPLACE-LOCAL
      POSTGRES_USER: localmarket
      POSTGRES_PASSWORD: localmarket
    volumes:
      - localmarket_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  localmarket_data:
